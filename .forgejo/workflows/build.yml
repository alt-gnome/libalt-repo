name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'

jobs:
  lint-vala:
    name: Lint vala files
    runs-on: alt-sisyphus
    container:
      image: altlinux.space/alt-gnome/coding-style-image:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint files
        uses: alt-gnome/coding-style-actions/vala@main

  test-build:
    name: Test Build
    runs-on: alt-sisyphus
    needs:
      - checkers
      - lint-vala

    steps:
      - name: Install libs on container
        run: |
          apt-get update
          apt-get install -y git meson vala libapi-base-devel "pkgconfig(json-glib-1.0)" "gir(Json)=1.0" "pkgconfig(gee-0.8)" "gir(Gee)=0.8" "pkgconfig(gio-2.0)" "pkgconfig(libsoup-3.0)" "gir(Soup)=3.0" "gir(ApiBase)=5" "pkgconfig(json-glib-1.0)" "gobject-introspection-devel" valadoc /usr/bin/gtkdoc-scan

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        run: meson setup _build -Dprefix=/usr -Ddocumentation=true

      - name: Build
        run: ninja install -C _build

      - name: Deploy pages
        uses: actions/deploy-pages@v1
        with:
          directory: ./_build/doc/libalt-repo-1-vala
